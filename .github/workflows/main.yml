name: Laravel CI Pipeline

# El robot se ejecutará cada vez que alguien haga un Push a Main 
# o abra un Pull Request hacia Main.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga el código del repositorio
    - name: 📥 Checkout del Código
      uses: actions/checkout@v3

    # 2. Prepara el entorno PHP
    - name: 🐘 Configurar PHP 8.2
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, iconv, json, libxml, fileinfo
        coverage: none

    # 3. Cachear dependencias de Composer para que sea más rápido
    - name: 🗃️ Cachear Dependencias
      id: composer-cache
      run: |
        echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
    - uses: actions/cache@v3
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    # 4. Instalar las dependencias del Backend (Laravel)
    - name: 📦 Instalar Dependencias (Composer)
      run: composer install --prefer-dist --no-progress --no-suggest

    # 5. Configurar el archivo de Entorno
    - name: ⚙️ Preparar Archivo .env
      run: cp .env.example .env

    # 6. Generar llave de aplicación
    - name: 🔑 Generar App Key
      run: php artisan key:generate

    # 7. Ejecutar Comando de Verificación Inicial (Pruebas base de Laravel)
    - name: 🧪 Ejecutar Pruebas y Validación (Linter/Tests)
      run: php artisan test --env=testing
